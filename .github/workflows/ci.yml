# CI Pipeline — M1c-1
#
# Runs on every push and PR. Tests, lint, build, doc-validate.
# On push to main: syncs to platform (deploy handled by Vercel Git integration).
# CI-agnostic deployment scripts in /scripts/ (ADR-018).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Test (unit + accessibility)
        run: pnpm test

      - name: Build
        id: build
        run: pnpm build 2>&1 | tee build-output.txt

      - name: Performance budget (PRI-07)
        if: always() && steps.build.conclusion == 'success'
        continue-on-error: true
        run: bash scripts/check-perf-budget.sh build-output.txt

  sync:
    name: Sync to Platform
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Notify platform (deployment sync)
        run: |
          curl -sf -X POST https://yogananda.tech/api/webhooks/deploy \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"project\":\"teachings\",\"commit_sha\":\"${GITHUB_SHA::7}\",\"source\":\"ci\"}" \
            || echo "Platform sync skipped (PRI-06 fallback)"

      - name: Summary
        run: |
          echo "### Platform Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy: Vercel Git integration (automatic)" >> "$GITHUB_STEP_SUMMARY"
          echo "Promote via platform: \`promote teachings\`" >> "$GITHUB_STEP_SUMMARY"

  doc-validate:
    name: Document Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Advisory in Arc 1 — does not block merge
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Validate documents
        run: |
          if [ -f scripts/doc-validate.sh ]; then
            bash scripts/doc-validate.sh
          else
            echo "doc-validate.sh not found, skipping"
          fi
