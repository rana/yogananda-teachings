<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — SRF Teachings Portal</title>
  <style>
    :root {
      --bg: #FAF8F5;
      --text: #1a2744;
      --text-secondary: rgba(26, 39, 68, 0.5);
      --gold: #dcbd23;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1923;
        --text: #e8e4dc;
        --text-secondary: #a9a49a;
        --gold: #e8cf4a;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      max-width: 28rem;
      text-align: center;
    }
    .lotus {
      width: 48px;
      height: 48px;
      margin: 0 auto 2rem;
      opacity: 0.4;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 1rem;
      line-height: 1.4;
    }
    p {
      font-size: 0.9375rem;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    .quote {
      font-style: italic;
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text);
      padding: 1.5rem 0;
      border-top: 1px solid rgba(26, 39, 68, 0.08);
      border-bottom: 1px solid rgba(26, 39, 68, 0.08);
      margin: 2rem 0;
    }
    @media (prefers-color-scheme: dark) {
      .quote {
        border-color: rgba(232, 228, 220, 0.08);
      }
    }
    .citation {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      font-style: normal;
    }
    .citation::before {
      content: "\2014\00a0";
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      min-width: 44px;
      padding: 0.75rem 1.5rem;
      border: 1px solid rgba(26, 39, 68, 0.12);
      border-radius: 0.375rem;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    @media (prefers-color-scheme: dark) {
      .retry-btn {
        border-color: rgba(232, 228, 220, 0.12);
      }
    }
    .retry-btn:hover {
      border-color: var(--gold);
    }
    .retry-btn:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="lotus" viewBox="0 0 100 100" fill="none" aria-hidden="true">
      <path d="M50 15c-8 12-20 25-20 40 0 12 8 22 20 30 12-8 20-18 20-30 0-15-12-28-20-40z" fill="currentColor" opacity="0.15"/>
      <path d="M50 25c-5 8-12 18-12 28 0 8 5 15 12 20 7-5 12-12 12-20 0-10-7-20-12-28z" fill="currentColor" opacity="0.25"/>
      <path d="M50 35c-3 5-7 11-7 18 0 5 3 10 7 13 4-3 7-8 7-13 0-7-4-13-7-18z" fill="currentColor" opacity="0.4"/>
    </svg>
    <h1>You are offline</h1>
    <p>
      The teachings are waiting for you. Please check your connection
      and try again when you are ready.
    </p>
    <div class="quote">
      <p style="color: inherit; margin-bottom: 0;">
        "In the stillness of your patience, all things will unfold."
      </p>
      <div class="citation">Paramahansa Yogananda</div>
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      Try again
    </button>
  </div>
</body>
</html>
